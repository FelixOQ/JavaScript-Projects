<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Fee-licious Pizza</title>
        <meta http-equiv="content-type" content="text/html; charset=utf-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <script src="./Pizza_JavaScript/Pizza.js" defer></script>
        <link rel="stylesheet" type="text/css" href="./Pizza_CSS/Pizza.css">
    </head>
    <body>
        <div id="menuBG">
            <h1>Order your Fee-licious Pizza today!</h1>
            <input id="btnOrder" type="button" onclick="getReceipt()" value="Place Order">
            
            <form id="frmMenu">
                <div class="menu left">
                    <h3>Size:</h3>
                    <input class="size" type="radio" name="Size" value="Personal Pizza">Personal<br>
                    <input class="size" type="radio" name="Size" value="Medium Pizza">Medium<br>
                    <input class="size" type="radio" name="Size" value="Large Pizza">Large<br>
                    <input class="size" type="radio" name="Size" value="Extra Large Pizza">Extra Large<br>
                    <input class="size" type="radio" name="Size" value="Jumbo Pizza">Jumbo<br>
                </div>

                <div class="menu centre">
                    <h3>Mains:</h3>
                    <input class="toppings" type="checkbox" name="Topping" value="Anchovies">Anchovies<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Bacon">Bacon<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Chicken">Chicken<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Chorizo">Chorizo<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Pepperoni">Pepperoni<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Sausage">Sausage<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Tofu">Tofu<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Vegan Chorizo">Vegan Chorizo<br>
                </div>

                <div class="menu right">
                    <h3>Vegetables:</h3>
                    <input class="veg" type="checkbox" name="Veggie" value="Mushrooms">Mushrooms<br>
                    <input class="veg" type="checkbox" name="Veggie" value="Olives">Olives<br>
                    <input class="veg" type="checkbox" name="Veggie" value="Onions">Onions<br>
                    <input class="veg" type="checkbox" name="Veggie" value="Peppers">Peppers<br>
                    <input class="veg" type="checkbox" name="Veggie" value="Sweetcorn">Sweetcorn<br>
                    <input class="veg" type="checkbox" name="Veggie" value="Tomatoes">Tomatoes<br>
                </div>

                <div id="cart">
                    <div id="showText"></div>
                    <div id="totalPrice"></div>
                </div>
            </form>
        </div>
    </body>
</html>
